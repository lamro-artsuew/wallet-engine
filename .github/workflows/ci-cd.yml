name: CI — Build & Push

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

env:
  HARBOR_REGISTRY: harbor.157.180.105.202.nip.io
  HARBOR_PROJECT: osonx
  IMAGE_NAME: wallet-engine

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Run tests
        run: go test ./... -v -race -count=1

      - name: Build binary
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o wallet-engine ./cmd/server

      - name: Compute image tags
        id: tags
        run: |
          SHA_TAG="sha-$(echo ${{ github.sha }} | cut -c1-8)"
          echo "sha_tag=${SHA_TAG}" >> $GITHUB_OUTPUT

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            echo "version_tag=${VERSION}" >> $GITHUB_OUTPUT
            echo "tags=${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${IMAGE_NAME}:${VERSION},${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${IMAGE_NAME}:${SHA_TAG}" >> $GITHUB_OUTPUT
          else
            echo "tags=${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${IMAGE_NAME}:${SHA_TAG}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.sha_tag }}
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
